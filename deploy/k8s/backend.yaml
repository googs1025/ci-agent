apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-agent-backend
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ci-agent
spec:
  replicas: 1                                     # SQLite does not support multi-replica
  strategy:
    type: Recreate                                # Avoid concurrent SQLite access
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: ci-agent
    spec:
      containers:
        - name: backend
          image: ci-agent-backend:latest          # Replace with your registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: ci-agent-secrets
            - configMapRef:
                name: ci-agent-config
          volumeMounts:
            - name: data
              mountPath: /data/.ci-agent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ci-agent-data
---
apiVersion: v1
kind: Service
metadata:
  name: ci-agent-backend
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ci-agent
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
