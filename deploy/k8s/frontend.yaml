apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-agent-frontend
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: ci-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: ci-agent
    spec:
      containers:
        - name: frontend
          image: ci-agent-frontend:v0.1.0         # Replace with your registry/tag
          imagePullPolicy: Always                 # Always pull; use specific tags, not latest
          ports:
            - containerPort: 3000
              name: http
          env:
            # NOTE: Next.js rewrites() are baked at BUILD time via --build-arg NEXT_PUBLIC_API_URL.
            # This runtime env is used only by SSR server code for direct backend calls.
            # Build the image with: --build-arg NEXT_PUBLIC_API_URL=http://ci-agent-backend:8000
            - name: NEXT_PUBLIC_API_URL
              value: "http://ci-agent-backend:8000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ci-agent-frontend
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: ci-agent
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
