apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ci-agent-ingress
  namespace: ci-agent
  labels:
    app.kubernetes.io/part-of: ci-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"        # Analysis can take minutes
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx                          # Adjust to your ingress controller
  rules:
    - host: ci-agent.example.com                   # Replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ci-agent-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ci-agent-frontend
                port:
                  number: 3000
    # ── Langfuse UI (self-hosted) ──
    - host: langfuse.example.com                   # Replace with your Langfuse domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - ci-agent.example.com
  #       - langfuse.example.com
  #     secretName: ci-agent-tls
