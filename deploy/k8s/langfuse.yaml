# ── Langfuse self-hosted (PostgreSQL + Langfuse Server) ──────────────────────
# Provides LLM observability dashboard within the cluster.
# Access via: http://ci-agent.example.com/langfuse (or port-forward 3000)
#
# After deploy:
#   1. Create an account at the Langfuse UI
#   2. Create a project and copy the API keys
#   3. Set LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY in ci-agent-secrets
#   4. Set LANGFUSE_HOST to http://langfuse:3000 in ci-agent-config
# ─────────────────────────────────────────────────────────────────────────────

# ── PostgreSQL for Langfuse ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-postgres-data
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/part-of: ci-agent
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-postgres
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/part-of: ci-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-postgres
        app.kubernetes.io/part-of: ci-agent
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: langfuse
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "langfuse"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "langfuse"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/part-of: ci-agent
spec:
  selector:
    app.kubernetes.io/name: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ── Langfuse Server ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/part-of: ci-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse
        app.kubernetes.io/part-of: ci-agent
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://langfuse:$(POSTGRES_PASSWORD)@langfuse-postgres:5432/langfuse"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: "http://langfuse:3000"
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: SALT
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/part-of: ci-agent
spec:
  selector:
    app.kubernetes.io/name: langfuse
  ports:
    - port: 3000
      targetPort: 3000
      name: http

---
# ── Langfuse Secrets ──
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: ci-agent
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/part-of: ci-agent
type: Opaque
stringData:
  POSTGRES_PASSWORD: "langfuse-pg-password"    # REQUIRED: change before deploy
  NEXTAUTH_SECRET: "change-me-nextauth-secret" # REQUIRED: random string
  SALT: "change-me-salt-value"                  # REQUIRED: random string
