apiVersion: v1
kind: Secret
metadata:
  name: ci-agent-secrets
  namespace: ci-agent
  labels:
    app.kubernetes.io/part-of: ci-agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-anthropic-api-key"    # REQUIRED: replace before apply
  GITHUB_TOKEN: "your-github-token"               # RECOMMENDED: replace before apply
  CI_AGENT_API_KEY: ""                              # OPTIONAL: set to enable API auth
  # ── Langfuse (self-hosted) ──
  # Create a project in Langfuse UI after deploy, then fill in these keys.
  LANGFUSE_PUBLIC_KEY: ""                            # OPTIONAL: from Langfuse project settings
  LANGFUSE_SECRET_KEY: ""                            # OPTIONAL: from Langfuse project settings
