apiVersion: v1
kind: Secret
metadata:
  name: ci-agent-secrets
  namespace: ci-agent
  labels:
    app.kubernetes.io/part-of: ci-agent
type: Opaque
stringData:
  # ── AI API Keys (at least one is REQUIRED) ──

  # Anthropic Claude API Key — required when CI_AGENT_PROVIDER=anthropic
  ANTHROPIC_API_KEY: ""

  # OpenAI API Key — required when CI_AGENT_PROVIDER=openai
  # Also works with OpenAI-compatible proxies (set CI_AGENT_BASE_URL in ConfigMap)
  OPENAI_API_KEY: ""

  # ── GitHub ──

  # GitHub Personal Access Token — RECOMMENDED
  # Used to fetch CI run history, job logs, and Action SHAs
  # Without it, API rate limit is 60 req/hr (vs 5000 with token)
  # Scopes needed: public_repo (public repos) or full repo (private repos)
  GITHUB_TOKEN: ""

  # ── API Authentication ──

  # Optional Bearer token to protect the /api/* endpoints
  # If set, all API requests must include: Authorization: Bearer <this-value>
  CI_AGENT_API_KEY: ""

  # ── Langfuse Observability (optional) ──

  # Project keys from Langfuse settings — enables LLM token/cost/latency tracing
  # Leave empty to disable; set LANGFUSE_HOST in ConfigMap to point to your instance
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
