apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-agent-config
  namespace: ci-agent
  labels:
    app.kubernetes.io/part-of: ci-agent
data:
  CI_AGENT_MODEL: "claude-sonnet-4-20250514"
  CI_AGENT_PROVIDER: "anthropic"
  CI_AGENT_LANGUAGE: "en"
  CORS_ORIGINS: "https://ci-agent.example.com"    # REQUIRED: update to your domain
  # ── Langfuse (self-hosted) ──
  # Points to the in-cluster Langfuse service. Leave empty to disable tracing.
  LANGFUSE_HOST: "http://langfuse:3000"
