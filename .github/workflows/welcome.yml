name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue! We'll take a look soon.

            Before we dig in, please make sure:
            - You're using the latest version (`v0.0.1`+)
            - You've checked [existing issues](https://github.com/googs1025/ci-agent/issues) for duplicates

            If this is a bug, please include:
            - Steps to reproduce
            - Expected vs actual behavior
            - Backend logs (`docker compose logs backend`)
          pr-message: |
            🎉 Thanks for your first pull request!

            A maintainer will review it shortly. In the meantime:
            - Make sure CI checks pass (lint + tests + Docker build)
            - Keep changes focused — one feature/fix per PR
            - Add tests if applicable
