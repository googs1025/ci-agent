name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday 02:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days.
            It will be closed in 14 days if there is no further activity.
            Feel free to reopen if still relevant.
          stale-pr-message: >
            This PR has been inactive for 30 days.
            It will be closed in 7 days if there is no further activity.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "v0.1.0,pinned"
          exempt-pr-labels: "pinned"
