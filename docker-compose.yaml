services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CI_AGENT_PROVIDER=${CI_AGENT_PROVIDER:-anthropic}
      - CI_AGENT_MODEL=${CI_AGENT_MODEL:-claude-sonnet-4-20250514}
      - CI_AGENT_BASE_URL=${CI_AGENT_BASE_URL:-}
      - CI_AGENT_LANGUAGE=${CI_AGENT_LANGUAGE:-en}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CI_AGENT_API_KEY=${CI_AGENT_API_KEY:-}
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ci-agent-data:/data/.ci-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Baked into Next.js rewrites at build time; matches the backend service name
        NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_CI_AGENT_API_KEY=${CI_AGENT_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  ci-agent-data: